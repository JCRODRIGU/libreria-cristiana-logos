<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Librería Cristiana Logos</title>
    
    <!-- Pixel Meta -->
    <script>
        !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '1377317584454825');
        fbq('track', 'PageView');
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            background-color: #000;
            font-family: sans-serif;
        }

        .seccion-full {
            height: 100vh;
            height: calc(var(--vh, 1vh) * 100);
            width: 100%;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            position: relative; /* Necesario para posicionar la flecha */
            overflow: hidden;
        }

        .imagen-perfecta {
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Indicador de Scroll */
        .scroll-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #25D366; /* Verde WhatsApp */
            font-size: 24px;
            animation: bounce 2s infinite;
            z-index: 5;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) translateX(-50%); }
            40% { transform: translateY(-10px) translateX(-50%); }
            60% { transform: translateY(-5px) translateX(-50%); }
        }
    </style>
</head>
<body>

    <script>
        // Mensaje personalizado para WhatsApp
        const mensajeWa = encodeURIComponent("Hola, estoy interesado en un producto cristiano");

        for (let i = 1; i <= 12; i++) {
            // Genera la flecha solo hasta la imagen 11
            const flecha = i < 12 ? '<div class="scroll-indicator">▼</div>' : '';
            
            document.write(`
                <a href="https://wa.me/573125756581?text=${mensajeWa}" 
                   class="seccion-full track-whatsapp" 
                   data-producto="Producto ${i}">
                    <div class="imagen-perfecta" style="background-image: url('${i}.png?v=${Date.now()}');"></div>
                    ${flecha}
                </a>
            `);
        }
    </script>

    <script>
        // Corrección de altura para móviles
        function ajustarPantalla() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        window.addEventListener('resize', ajustarPantalla);
        ajustarPantalla();

        // Script de Seguimiento
        document.querySelectorAll('.track-whatsapp').forEach(enlace => {
            enlace.addEventListener('click', function() {
                const nombreProducto = this.getAttribute('data-producto');
                fbq('trackCustom', 'WhatsAppClick', {
                    content_name: nombreProducto
                });
                console.log('Evento enviado: ' + nombreProducto);
            });
        });
    </script>
</body>
</html>
