<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería Cristiana Logos</title>
    
    <script>
        !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '1377317584454825');
        fbq('track', 'PageView');
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Estructura de Scroll Snapping */
        html, body {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory; /* El navegador "atrapa" el scroll */
            font-family: sans-serif;
        }

        .seccion-full {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start; /* Define el punto de anclaje */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
        }

        .seccion-full img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Muestra la imagen completa sin recortar */
        }

        .btn-wa-overlay {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: #25D366;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }
    </style>
</head>
<body>

    <script>
        for (let i = 1; i <= 12; i++) {
            document.write(`
                <section class="seccion-full">
                    <img src="${i}.png" alt="Producto ${i}">
                    <a href="https://wa.me/573125756581?text=Hola, me interesa el producto ${i}" 
                       class="btn-wa-overlay track-whatsapp">
                       Consultar por WhatsApp
                    </a>
                </section>
            `);
        }
    </script>

    <script>
        document.querySelectorAll('.track-whatsapp').forEach(btn => {
            btn.addEventListener('click', function() {
                const productName = this.previousElementSibling.getAttribute('alt');
                fbq('trackCustom', 'WhatsAppClick', {
                    content_name: productName
                });
            });
        });
    </script>
</body>
</html>
