<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería Cristiana Logos</title>
    
    <script>
        !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '1377317584454825');
        fbq('track', 'PageView');
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            background-color: #000; /* Fondo negro por si la imagen no llena perfecto */
        }

        .seccion-full {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            display: block; /* Para que el enlace ocupe todo */
            text-decoration: none;
        }

        /* Aquí es donde eliminamos los espacios negros */
        .imagen-fondo {
            width: 100%;
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover; /* Esto estira la imagen para llenar toda la pantalla */
        }
    </style>
</head>
<body>

    <script>
        for (let i = 1; i <= 12; i++) {
            document.write(`
                <a href="https://wa.me/573125756581?text=Hola, me interesa el producto ${i}" 
                   class="seccion-full track-whatsapp" 
                   data-producto="Producto ${i}">
                    <div class="imagen-fondo" style="background-image: url('${i}.png');"></div>
                </a>
            `);
        }
    </script>

    <script>
        document.querySelectorAll('.track-whatsapp').forEach(enlace => {
            enlace.addEventListener('click', function() {
                const nombreProducto = this.getAttribute('data-producto');
                fbq('trackCustom', 'WhatsAppClick', {
                    content_name: nombreProducto
                });
            });
        });
    </script>
</body>
</html>
