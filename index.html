<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería Cristiana Logos | Bogotá</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; }
        .hero { background: #2c3e50; color: white; padding: 60px 20px; }
        .productos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 40px; max-width: 1000px; margin: auto; }
        .producto { background: white; padding: 10px; border-radius: 8px; }
        .producto img { width: 100%; height: auto; border-radius: 5px; }
    </style>
</head>
<body>
    <section class="hero">
        <h1>Librería Cristiana Logos</h1>
        <p>Encuentra recursos que fortalecen tu fe.</p>
    </section>

    <div class="productos-grid">
        <!-- Estos links ahora buscarán en 'main' -->
        <div class="producto"><img src="61.jpg" alt="Biblia"><h3>Biblia 61</h3></div>
        <div class="producto"><img src="62.jpg" alt="Biblia"><h3>Biblia 62</h3></div>
        <div class="producto"><img src="63.jpg" alt="Biblia"><h3>Biblia 63</h3></div>
        <div class="producto"><img src="64.jpg" alt="Biblia"><h3>Biblia 64</h3></div>
    </div>
</body>
</html>
