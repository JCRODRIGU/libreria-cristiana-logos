    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            background-color: #000;
            font-family: sans-serif;
        }

        .seccion-full {
            height: 100vh;
            height: calc(var(--vh, 1vh) * 100);
            width: 100%;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .imagen-perfecta {
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
        }

        /* Indicador de Scroll tipo Gesto */
        .scroll-btn {
            position: absolute;
            bottom: 30px;
            right: 20px; /* Posicionado a la derecha como pediste */
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            z-index: 20;
            cursor: pointer;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MKSM7DFT"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

    <script>
        const mensajeWa = encodeURIComponent("Hola, estoy interesado en un producto cristiano");

        for (let i = 1; i <= 12; i++) {
            // El enlace va por fuera del botón de scroll
            document.write(`
                <div class="seccion-full" id="seccion-${i}">
                    <a href="https://wa.me/573125756581?text=${mensajeWa}" 
                       class="imagen-perfecta track-whatsapp" 
                       data-producto="Producto ${i}"
                       style="background-image: url('${i}.png?v=${Date.now()}');">
                    </a>
                    
                    ${i < 12 ? `<div class="scroll-btn" onclick="scrollToNext(${i})">↕</div>` : ''}
                </div>
            `);
        }

        function scrollToNext(current) {
            const nextSection = document.getElementById(`seccion-${current + 1}`);
            nextSection.scrollIntoView({ behavior: 'smooth' });
        }
    </script>

    <script>
        function ajustarPantalla() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        window.addEventListener('resize', ajustarPantalla);
        ajustarPantalla();

        document.querySelectorAll('.track-whatsapp').forEach(enlace => {
            enlace.addEventListener('click', function() {
                const nombreProducto = this.getAttribute('data-producto');
                fbq('trackCustom', 'WhatsAppClick', { content_name: nombreProducto });
            });
        });
    </script>
</body>
</html>
